services:
  saloony-front:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: saloony-front
    ports:
      - '8081:8081'
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    stdin_open: true
    tty: true
    networks:
      - saloony

networks:
  saloony:
    driver: bridge
